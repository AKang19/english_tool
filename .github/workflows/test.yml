name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  unit-and-api:
    name: Unit + Component + API Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Backend tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Frontend type check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Frontend tests
        run: |
          cd frontend
          npx vitest run

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: unit-and-api

    steps:
      - uses: actions/checkout@v4

      - name: Create .env for docker compose
        run: |
          cat > .env << 'EOF'
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          GOOGLE_CLIENT_ID=test-client-id
          JWT_SECRET_KEY=ci-test-secret-key-32chars-long!!
          SMTP_EMAIL=
          SMTP_APP_PASSWORD=
          E2E_TEST=1
          EOF

      - name: Start services
        run: |
          docker compose up --build -d
          echo "Waiting for services..."
          # Wait for backend
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/docs > /dev/null 2>&1; then
              echo "Backend ready!"
              break
            fi
            echo "Waiting for backend... ($i/60)"
            sleep 5
          done
          # Verify test-login endpoint
          curl -sf -X POST http://localhost:8000/api/auth/test-login || (echo "test-login failed!" && docker compose logs backend --tail=30 && exit 1)
          # Wait for frontend
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Frontend ready!"
              break
            fi
            echo "Waiting for frontend... ($i/30)"
            sleep 3
          done

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies and Playwright
        run: |
          cd frontend
          npm ci
          npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: |
          cd frontend
          npx playwright test --reporter=list

      - name: Show backend logs on failure
        if: failure()
        run: docker compose logs backend --tail=50

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/test-results/
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose down
